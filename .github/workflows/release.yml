name: release

# Compile the `krom` CLI to a native, self-contained binary for each OS/arch
# and attach them to the GitHub Release when a `vX.Y.Z` tag is pushed.
# The install.sh script downloads the right asset for the user's platform.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset: krom-darwin-arm64
          - os: macos-13
            asset: krom-darwin-x64
          - os: ubuntu-latest
            asset: krom-linux-x64
          - os: ubuntu-24.04-arm
            asset: krom-linux-arm64
          - os: windows-latest
            asset: krom-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Resolve dependencies
        run: dart pub get
      - name: Compile native executable
        shell: bash
        run: dart compile exe bin/krom_bundler.dart -o "${{ matrix.asset }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum krom-* > SHA256SUMS
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/krom-*
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
