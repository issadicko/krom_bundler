name: release

# Compile the `krom` CLI to a native, self-contained binary for each OS/arch
# and attach them to the GitHub Release when a `vX.Y.Z` tag is pushed.
#
# Resilient design: each build job publishes its OWN binary (+ .sha256) directly
# to the release, so a slow or unavailable runner (e.g. the retiring macOS Intel
# pool) never blocks the other platforms. install.sh downloads the right asset.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create_release:
    name: ensure release
    runs-on: ubuntu-latest
    steps:
      - name: Create the release if it does not exist yet
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "krom ${TAG#v}" --generate-notes

  build:
    name: build ${{ matrix.asset }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            asset: krom-darwin-arm64
          - os: macos-13
            asset: krom-darwin-x64
          - os: ubuntu-latest
            asset: krom-linux-x64
          - os: ubuntu-24.04-arm
            asset: krom-linux-arm64
          - os: windows-latest
            asset: krom-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Resolve dependencies
        run: dart pub get
      - name: Compile native executable
        shell: bash
        run: dart compile exe bin/krom_bundler.dart -o "${{ matrix.asset }}"
      - name: Checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
      - name: Upload to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" \
            "${{ matrix.asset }}" "${{ matrix.asset }}.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber
