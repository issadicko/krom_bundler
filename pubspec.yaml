name: krom_bundler
description: CLI tool for bundling KromLang scripts with dev server support.
version: 0.1.0
publish_to: none

# Installed command name (dart pub global activate / dart compile exe -> `krom`).
executables:
  krom: krom_bundler

environment:
  sdk: ^3.0.0

dependencies:
  # KromLang core, from pub.dev (no repo access needed to build).
  krom_script: ^1.0.0
  
  # CLI framework
  args: ^2.4.0
  
  # HTTP server
  shelf: ^1.4.0
  qr: ^3.0.1               # terminal QR for `krom dev` (Krom Go scan)
  shelf_static: ^1.1.0
  shelf_web_socket: ^1.0.0
  
  # File watching
  watcher: ^1.1.0
  
  # Path utilities
  path: ^1.8.0
  
  # WebSocket
  web_socket_channel: ^2.4.0
  
  # Console colors
  ansicolor: ^2.0.0

  # HTTP client
  http: ^1.1.0

  # Media types for multipart uploads
  http_parser: ^4.0.0

  # ZIP archive for signed version packages
  archive: ^3.4.0

  # SHA-256 integrity hashing for embedded assets
  crypto: ^3.0.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
